<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Agent</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ── Source cards ── */
    .source-card {
      margin-top: 8px;
      padding: 10px 14px;
      background: #f9f9f7;
      border: 1px solid #e8e8e6;
      border-left: 3px solid #888;
      border-radius: 0 8px 8px 0;
      font-size: 0.85rem;
      color: #555;
      line-height: 1.6;
    }
    .source-card .source-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      margin-bottom: 4px;
    }
    .source-card .source-text { color: #444; margin-bottom: 6px; }
    .source-card a {
      font-size: 0.8rem;
      color: #1a1a18;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
    }
    .source-card a:hover { border-bottom-color: #1a1a18; }
    .source-card.no-source { border-left-color: #ddd; color: #aaa; font-style: italic; }

    /* ── Sub-task layout ── */
    #subtasks-list li { flex-direction: column; align-items: flex-start; gap: 0; }
    .subtask-question { display: flex; gap: 8px; align-items: flex-start; width: 100%; }
    .subtask-num { font-size: 0.75rem; font-weight: 600; color: #999; margin-top: 2px; flex-shrink: 0; }
    .subtask-text { font-size: 0.9rem; color: #444; line-height: 1.5; }

    /* ── Day 5: Step detail + time ── */
    .step-detail {
      font-size: 0.78rem;
      color: #888;
      margin-top: 3px;
      line-height: 1.4;
      display: none;
    }
    .step-time {
      font-size: 0.72rem;
      color: #bbb;
      margin-top: 2px;
      display: none;
    }
    .step.done .step-detail { color: #5a8a3a; }
    .step.error .step-detail { color: #c0392b; }
    .step.error .step-time { color: #e57373; }
    .step-text-wrap { display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Research Agent</h1>
      <p class="subtitle">Ask anything. The agent breaks it down, finds sources, and writes a report.</p>
    </header>

    <div class="search-box">
      <input
        type="text"
        id="question-input"
        placeholder="e.g. What caused the 2008 financial crisis?"
        autocomplete="off"
      />
      <button id="search-btn" onclick="startResearch()">Research</button>
    </div>

    <!--
      DAY 5 UPGRADE: Each step now has 3 elements:
        1. step-icon    — the circle (spinner / tick / red dot)
        2. step-label   — the main label text
        3. step-detail  — sub-detail injected by updateStep()
        4. step-time    — "Completed in Xs" injected by updateStep()
    -->
    <div class="steps-panel" id="steps-panel" style="display:none;">

      <div class="step" id="step-decompose">
        <span class="step-icon pending" id="icon-decompose"></span>
        <div class="step-text-wrap">
          <span class="step-label" id="label-decompose">Breaking question into sub-tasks</span>
          <span class="step-detail" id="detail-decompose"></span>
          <span class="step-time"   id="time-decompose"></span>
        </div>
      </div>

      <div class="step" id="step-fetch">
        <span class="step-icon pending" id="icon-fetch"></span>
        <div class="step-text-wrap">
          <span class="step-label" id="label-fetch">Fetching sources</span>
          <span class="step-detail" id="detail-fetch"></span>
          <span class="step-time"   id="time-fetch"></span>
        </div>
      </div>

      <div class="step" id="step-report">
        <span class="step-icon pending" id="icon-report"></span>
        <div class="step-text-wrap">
          <span class="step-label" id="label-report">Writing report</span>
          <span class="step-detail" id="detail-report"></span>
          <span class="step-time"   id="time-report"></span>
        </div>
      </div>

    </div>

    <!-- Results area -->
    <div id="results" style="display:none;">
      <div id="subtasks-section">
        <h2>Sub-questions &amp; sources</h2>
        <ul id="subtasks-list"></ul>
      </div>
      <div id="report-section">
        <h2>Report</h2>
        <div id="report-output"></div>
      </div>
    </div>

    <div id="error-msg" class="error" style="display:none;"></div>
  </div>

  <script src="agent.js"></script>
</body>
</html>
